<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1C2230"></stop>
      <stop offset="1" stop-color="#0A0C12"></stop>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#60A5FA"></stop>
      <stop offset="1" stop-color="#3B82F6"></stop>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.35"></stop>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"></stop>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>

  
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"></rect>

  
  <rect x="1" y="1" width="510" height="510" rx="111" ry="111" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"></rect>

  
  
  
  <path d="M 96 200 L 176 288 L 256 232 L 336 312 L 416 144 L 416 384 L 96 384 Z" fill="url(#fade)"></path>

  
  <path d="M 96 200 L 176 288 L 256 232 L 336 312 L 416 144" fill="none" stroke="url(#stroke)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"></path>

  
  <circle cx="416" cy="144" r="18" fill="#60A5FA"></circle>
  <circle cx="416" cy="144" r="32" fill="#60A5FA" fill-opacity="0.22"></circle>

  
  <g opacity="0.35">
    <line x1="96" y1="384" x2="416" y2="384" stroke="rgba(255,255,255,0.08)" stroke-width="2" stroke-dasharray="4 6"></line>
  </g>
</svg>